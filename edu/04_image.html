<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Tag</title>
</head>
<body>
  <!-- 절대경로 -->
  <!-- root로부터 특정 파일까지의 전체 경로(고유한 경로) -->
  <img src="E:\j\workspace\msa4-html\edu\cat1.jpg" alt="고양이1">
  
  <!-- 상대경로 -->
  <!-- 현재 문서를 기준으로 해당 파일의 경로를 인식 -->
  <img src="/cat1.jpg" alt="고양이1"> <!-- root 기준 -->
  <img src="./cat1.jpg" alt="고양이1"> <!-- 현재 내 위치 기준 (./ 생략 가능) -->
  <img src="../img/cat2.jpg" alt="고양이2"> 
  </html>

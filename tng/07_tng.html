<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>form tag</title>
</head>
<body>
  <h1>회원가입을 환영합니다</h1>
  <form action="" method="get">
    <fieldset>
      <legend>사용자 정보</legend>
      <ul>
        <li>
          <label for="user-id">아이디</label>
          <input
            type="text"
            id="user-id"
            placeholder="4자 ~ 10자 사이, 공백없이"
            minlength="4"
            maxlength="10"
            required
          >
        </li>
        <li>
          <label for="user-email">이메일</label>
          <input type="email" name="user-email" id="user-email">
        </li>
        <li>
          <label for="user-pw">비밀번호</label>
          <input
            type="password"
            name="user-pw"
            id="user-pw"
            placeholder="문자와 숫자, 특수 기호 포함"
            required
          >
        </li>
        <li>
          <label for="pw-ck">비밀번호 확인</label>
          <input
            type="password"
            name="pw-ck"
            id="pw-ck"
            required
          >
        </li>
        <li>
          <label for="path">가입 경로</label>
          <select name="path" id="path">
            <option value="insta">인스타</option>
            <option value="search">검색</option>
            <option value="etc" selected>기타</option>
          </select>
        </li>
        <li>
          <label for="memo">메모</label>
          <textarea
            name="memo"
            id="memo"
            placeholder="남길 말씀이 있다면 여기에"
            cols="30"
            rows="10"
          ></textarea>
        </li>
      </ul>
    </fieldset>
    <fieldset>
      <legend>이벤트와 새로운 소식</legend>
      <div>
        <input type="radio" name="event" id="event-y" value="event-y">
        <label for="y">메일 수신</label>
        <input type="radio" name="event" id="event-n" value="event-n" checked>
        <label for="n">메일 수신 안 함</label>
      </div>
    </fieldset>
    <button type="submit">가입하기</button>
    <button type="reset">취소</button>
  </form>
</body>
</html>
